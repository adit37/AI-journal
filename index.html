<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Journal - Teman Curhat Harianmu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        
        .cozy-bg {
            background-color: #FAF6F0;
            background-image: radial-gradient(at 9% 10%, hsla(38,60%,90%,1) 0px, transparent 50%),
                              radial-gradient(at 89% 8%, hsla(160,40%,90%,1) 0px, transparent 50%),
                              radial-gradient(at 50% 90%, hsla(28,60%,92%,1) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .cozy-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 40px -10px rgba(120, 110, 100, 0.1);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="cozy-bg min-h-screen text-stone-700 antialiased selection:bg-amber-200 selection:text-stone-800">
    <div class="max-w-3xl mx-auto px-6 py-12 md:py-16">
        
        <!-- Header -->
        <header class="mb-12 text-center relative">
            <div class="absolute -top-4 -left-2 text-5xl animate-float opacity-70">🌿</div>
            <div class="absolute top-2 -right-2 text-4xl animate-float opacity-70" style="animation-delay: 2s;">☕</div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-stone-800 mb-4 tracking-tight drop-shadow-sm">
                Jurnal Harianku 🌻
            </h1>
            <p class="text-stone-500 text-lg md:text-xl font-medium max-w-xl mx-auto leading-relaxed">
                Ruang tenang untuk mencatat harimu. Ceritakan semuanya, mari kita renungkan bersama. ✨
            </p>
        </header>

        <!-- Form Input Jurnal -->
        <div class="cozy-card p-7 md:p-10 rounded-[2.5rem] mb-14 transition-all duration-300 hover:shadow-xl hover:-translate-y-1">
            <h2 class="text-2xl font-bold mb-6 flex items-center text-stone-800">
                <span class="text-3xl mr-3">✍️</span> Ada cerita apa hari ini?
            </h2>
            <form id="journalForm" class="space-y-6">
                <div>
                    <label for="activity" class="block text-stone-600 font-bold mb-2 ml-1">Judul Cerita:</label>
                    <input type="text" id="activity" name="activity" class="w-full px-6 py-4 bg-stone-50/70 border border-stone-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-amber-200/50 focus:border-amber-300 focus:bg-white transition-all font-medium placeholder-stone-400 text-stone-800" placeholder="Misal: Pagi yang damai & belajar koding 💻" required>   
                </div>
                <div>
                    <label for="description" class="block text-stone-600 font-bold mb-2 ml-1">Ceritakan lebih detail:</label>
                    <textarea id="description" name="description" rows="5" class="w-full px-6 py-4 bg-stone-50/70 border border-stone-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-amber-200/50 focus:border-amber-300 focus:bg-white transition-all font-medium placeholder-stone-400 text-stone-800 resize-y" placeholder="Bagaimana perasaanmu? Apa saja yang kamu lakukan hari ini? Tuangkan semuanya di sini..." required></textarea>
                </div>
                <div class="pt-4">
                    <button type="submit" id="submitButton" class="w-full bg-amber-400 hover:bg-amber-500 text-stone-900 font-bold text-lg py-4 px-6 rounded-2xl transition-all duration-300 transform hover:scale-[1.01] active:scale-95 shadow-md hover:shadow-lg flex justify-center items-center gap-3">
                        <span>Simpan Jurnal</span> 🪄
                    </button>
                </div>
            </form>
            
            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="hidden mt-8 text-center text-stone-500 font-medium animate-pulse">
                <div class="inline-block text-3xl mb-3 animate-bounce">🌱</div>
                <p>Meresapi ceritamu sejenak... menyiapkan feedback yang hangat! ✨</p>
            </div>
        </div>

        <!-- Tempat Menampilkan Riwayat Jurnal -->
        <div id="journalHistory" class="mt-8">
            <h2 class="text-3xl font-extrabold mb-8 flex items-center text-stone-800 ml-2">
                <span class="text-3xl mr-3">📚</span> Lembaran Ceritamu
            </h2>
            <div id="journalList" class="space-y-8">
                <!-- Jurnal akan ditambahkan di sini -->
            </div>
        </div>

    </div>

    <script>
        let isEditMode = false;
        let editId = null;

        async function fetchJournalHistory() {
            try {
                const response = await fetch('/journal', { method: 'GET' });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const journalList = document.getElementById('journalList');
                journalList.innerHTML = ''; // Bersihkan list dulu

                const journals = await response.json();
                
                if (!journals || journals.length === 0) {
                    journalList.innerHTML = `
                        <div class="text-center p-12 cozy-card rounded-[2.5rem] border border-dashed border-stone-300">
                            <p class="text-4xl mb-4 opacity-70">📖</p>
                            <p class="text-stone-500 font-medium text-lg">Halaman ini masih kosong. Yuk, mulai isi ceritamu!</p>
                        </div>
                    `;
                    return;
                }

                journals.reverse().forEach(entry => {
                    const card = document.createElement('div');
                    card.className = 'cozy-card p-7 md:p-9 rounded-[2rem] transition-all hover:shadow-xl relative overflow-hidden';
                    
                    // Dekorasi skor yang lebih soft
                    let scoreBadge = '';
                    let scoreIcon = '';
                    if (entry.score >= 80) {
                        scoreBadge = 'bg-teal-100 text-teal-800 border-teal-200';
                        scoreIcon = '🌟 Luar Biasa';
                    } else if (entry.score >= 60) {
                        scoreBadge = 'bg-amber-100 text-amber-800 border-amber-200';
                        scoreIcon = '👍 Keren';
                    } else {
                        scoreBadge = 'bg-rose-100 text-rose-800 border-rose-200';
                        scoreIcon = '💪 Semangat';
                    }

                    const dateObj = new Date(entry.timestamp || entry.date);
                    const formattedDate = dateObj.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

                    card.innerHTML = `
                        <div class="flex flex-col md:flex-row md:items-start justify-between mb-6 gap-4 border-b border-stone-100 pb-5">
                            <div>
                                <h3 class="text-2xl font-bold text-stone-800 mb-2 flex items-center gap-2">
                                    ${entry.activity}
                                </h3>
                                <span class="text-sm font-medium text-stone-400 flex items-center gap-2">
                                    <span class="text-lg">🗓️</span> ${formattedDate}
                                </span>
                            </div>
                            <div class="flex-shrink-0">
                                <div class="px-4 py-2 rounded-xl text-sm font-bold border shadow-sm ${scoreBadge} flex items-center gap-2">
                                    <span>Skor: ${entry.score}/100</span>
                                    <span class="opacity-80">|</span>
                                    <span>${scoreIcon}</span>
                                </div>
                            </div>
                        </div>

                        <div class="text-stone-600 font-medium leading-relaxed mb-8 text-lg px-2">
                            ${entry.description}
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                            <div class="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100/50">
                                <span class="block font-bold text-indigo-700/80 mb-3 flex items-center gap-2">
                                    <span class="text-xl">💭</span> Analisis EQ
                                </span>
                                <p class="text-sm text-indigo-900/80 leading-relaxed font-medium">${entry.eq_analysis}</p>
                            </div>
                            <div class="bg-emerald-50/50 p-5 rounded-2xl border border-emerald-100/50">
                                <span class="block font-bold text-emerald-700/80 mb-3 flex items-center gap-2">
                                    <span class="text-xl">📌</span> Evaluasi
                                </span>
                                <p class="text-sm text-emerald-900/80 leading-relaxed font-medium">${entry.evaluation}</p>
                            </div>
                        </div>

                        <div class="bg-amber-50/70 p-5 md:p-6 rounded-2xl border border-amber-100/60 relative">
                            <span class="block font-bold text-amber-800/80 mb-2 flex items-center gap-2">
                                <span class="text-xl">💌</span> Pesan Semangat:
                            </span>
                            <p class="text-amber-900 font-semibold italic text-lg leading-relaxed">"${entry.motivation}"</p>
                        </div>
                        
                        <div class="flex gap-3 mt-6 justify-end border-t border-stone-100 pt-5">
                            <button onclick="editJournal(${entry.id}, '${entry.activity.replace(/'/g, "\\'")}', '${entry.description.replace(/'/g, "\\'")}')" class="px-4 py-2 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl font-bold transition-all text-sm flex items-center gap-2">
                                ✏️ Edit
                            </button>
                            <button onclick="deleteJournal(${entry.id})" class="px-4 py-2 bg-rose-100 hover:bg-rose-200 text-rose-700 rounded-xl font-bold transition-all text-sm flex items-center gap-2">
                                🗑️ Hapus
                            </button>
                        </div>
                    `;
                    journalList.appendChild(card);
                });
            } catch (error) {
                console.error('Error Gagal Mengambil Riwayat Jurnal:', error);
            }
        }

        // Handle Form Submit
        document.getElementById('journalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const activity = document.getElementById('activity').value;
            const description = document.getElementById('description').value;
            const loading = document.getElementById('loadingIndicator');
            const submitBtn = document.getElementById('submitButton');

            // Tampilkan loading, sembunyikan tombol
            loading.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                let url = '/journal';
                let method = 'POST';

                if (isEditMode) {
                    url = `/journal?id=${editId}`;
                    method = 'PUT';
                }

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ activity, description })
                });

                if (response.ok) {
                    document.getElementById('journalForm').reset();
                    isEditMode = false;
                    editId = null;
                    submitBtn.innerHTML = '<span>Simpan Jurnal</span> 🪄';
                    await fetchJournalHistory(); // Refresh riwayat jurnal
                } else {
                    alert('Oops! Gagal menyimpan cerita. Coba lagi ya!');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Oops! Terjadi kesalahan koneksi.');
            } finally {
                // Sembunyikan loading, kembalikan tombol
                loading.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        async function deleteJournal(id) {
            if (!confirm('Yakin ingin menghapus cerita ini? 🥺')) return;
            try {
                const response = await fetch(`/journal?id=${id}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchJournalHistory();
                } else {
                    alert('Gagal menghapus jurnal.');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function editJournal(id, activity, description) {
            isEditMode = true;
            editId = id;
            document.getElementById('activity').value = activity;
            document.getElementById('description').value = description;
            
            const submitBtn = document.getElementById('submitButton');
            submitBtn.innerHTML = '<span>Update Jurnal</span> ✨';
            
            // Scroll otomatis ke form
            document.getElementById('journalForm').scrollIntoView({ behavior: 'smooth' });
        }

        // Load data awal
        fetchJournalHistory();
    </script>
</body>
</html>
